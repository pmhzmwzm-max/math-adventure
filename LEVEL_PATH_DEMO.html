<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>关卡路径样式原型</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&display=swap" rel="stylesheet">
  <style>
    * { font-family: 'Nunito', sans-serif; }

    .game-container {
      width: 1024px;
      height: 768px;
      background: linear-gradient(180deg, #4facfe 0%, #00f2fe 100%);
      border-radius: 24px;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
      overflow: hidden;
    }

    .level-node {
      width: 72px;
      height: 72px;
      border-radius: 45% 55% 70% 30% / 40% 50% 60% 50%;
      border: 3px solid white;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
      font-weight: 900;
      color: white;
      box-shadow: 0 8px 0 currentColor;
      transition: all 0.2s ease;
    }

    .level-node:hover {
      transform: translateY(-4px) scale(1.08);
    }

    .level-node.current {
      background: linear-gradient(180deg, #fcd34d 0%, #f97316 100%);
      box-shadow: 0 8px 0 #E65100, 0 0 20px rgba(255, 193, 7, 0.7);
    }

    .level-node.completed {
      background: linear-gradient(180deg, #86efac 0%, #22c55e 100%);
      box-shadow: 0 8px 0 #2E7D32;
    }

    .level-node.unlocked {
      background: linear-gradient(180deg, #93c5fd 0%, #3b82f6 100%);
      box-shadow: 0 8px 0 #1976D2;
    }

    .level-node.locked {
      width: 56px;
      height: 56px;
      background: linear-gradient(180deg, #d1d5db 0%, #9ca3af 100%);
      box-shadow: 0 6px 0 #6b7280;
      opacity: 0.6;
    }

    .character {
      animation: bounce 1.5s ease-in-out infinite;
    }

    @keyframes bounce {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-8px); }
    }

    .path-shadow {
      stroke: rgba(0,0,0,0.15);
      stroke-width: 1.2;
      fill: none;
    }

    .path-main {
      stroke: #8D6E63;
      stroke-width: 1;
      fill: none;
      stroke-linecap: round;
    }

    .path-highlight {
      stroke: #A1887F;
      stroke-width: 0.6;
      fill: none;
      stroke-dasharray: 0.3 1;
    }
  </style>
</head>
<body class="min-h-screen bg-gray-200 flex items-center justify-center p-8">

  <div class="game-container relative flex flex-col">

    <!-- 顶部栏 -->
    <div class="absolute top-0 left-0 w-full p-4 flex justify-between items-start z-20">
      <button class="bg-white/95 backdrop-blur rounded-full px-4 py-2 flex items-center gap-2 shadow-lg border-2 border-white">
        <div class="w-8 h-8 bg-orange-400 rounded-full flex items-center justify-center text-white font-bold text-sm">1</div>
        <span class="font-bold text-gray-700">一年级</span>
      </button>
      <button class="bg-white/95 backdrop-blur rounded-full px-4 py-2 flex items-center gap-2 text-gray-700 font-bold shadow-lg border-2 border-white">
        <span>🧩</span>
        <span>3/5</span>
      </button>
    </div>

    <!-- 滚动地图区域 -->
    <div class="flex-1 overflow-y-auto mt-16 pb-8" style="scrollbar-width: none;">
      <div class="relative w-full" style="height: 4000px;">

        <!-- SVG 蜿蜒路径 -->
        <svg class="absolute inset-0 w-full h-full pointer-events-none" viewBox="0 0 100 100" preserveAspectRatio="none">
          <!-- 路径阴影 -->
          <path class="path-shadow" d="M 20 95 Q 20 89, 36 89 L 84 89 Q 84 83, 68 83 L 20 83 Q 20 77, 36 77 L 84 77 Q 84 71, 68 71 L 20 71 Q 20 65, 36 65 L 84 65 Q 84 59, 68 59 L 20 59 Q 20 53, 36 53 L 84 53 Q 84 47, 68 47 L 20 47 Q 20 41, 36 41 L 84 41 Q 84 35, 68 35 L 20 35 Q 20 29, 36 29 L 84 29 Q 84 23, 68 23 L 20 23 Q 20 17, 36 17 L 84 17 Q 84 11, 52 11" transform="translate(0.3, 0.3)"/>
          <!-- 主路径 -->
          <path class="path-main" d="M 20 95 Q 20 89, 36 89 L 84 89 Q 84 83, 68 83 L 20 83 Q 20 77, 36 77 L 84 77 Q 84 71, 68 71 L 20 71 Q 20 65, 36 65 L 84 65 Q 84 59, 68 59 L 20 59 Q 20 53, 36 53 L 84 53 Q 84 47, 68 47 L 20 47 Q 20 41, 36 41 L 84 41 Q 84 35, 68 35 L 20 35 Q 20 29, 36 29 L 84 29 Q 84 23, 68 23 L 20 23 Q 20 17, 36 17 L 84 17 Q 84 11, 52 11"/>
          <!-- 路径高光 -->
          <path class="path-highlight" d="M 20 95 Q 20 89, 36 89 L 84 89 Q 84 83, 68 83 L 20 83 Q 20 77, 36 77 L 84 77 Q 84 71, 68 71 L 20 71 Q 20 65, 36 65 L 84 65 Q 84 59, 68 59 L 20 59 Q 20 53, 36 53 L 84 53 Q 84 47, 68 47 L 20 47 Q 20 41, 36 41 L 84 41 Q 84 35, 68 35 L 20 35 Q 20 29, 36 29 L 84 29 Q 84 23, 68 23 L 20 23 Q 20 17, 36 17 L 84 17 Q 84 11, 52 11"/>
        </svg>

        <!-- 关卡节点示例（前15关） -->

        <!-- 第1关 - 左下起点，已完成 -->
        <div class="absolute transform -translate-x-1/2 -translate-y-1/2 flex flex-col items-center" style="left: 20%; top: 95%;">
          <div class="level-node completed shadow-lg">1</div>
          <div class="absolute top-full mt-2 bg-white/95 px-3 py-1 rounded-full text-xs font-bold text-gray-600 shadow-lg whitespace-nowrap">1. 加法入门</div>
          <div class="absolute -top-1 -right-1 w-5 h-5 bg-green-500 rounded-full flex items-center justify-center border-2 border-white shadow-md">✓</div>
        </div>

        <!-- 第2关 -->
        <div class="absolute transform -translate-x-1/2 -translate-y-1/2 flex flex-col items-center" style="left: 36%; top: 89%;">
          <div class="level-node completed shadow-lg">2</div>
          <div class="absolute top-full mt-2 bg-white/95 px-3 py-1 rounded-full text-xs font-bold text-gray-600 shadow-lg whitespace-nowrap">2. 减法基础</div>
          <div class="absolute -top-1 -right-1 w-5 h-5 bg-green-500 rounded-full flex items-center justify-center border-2 border-white shadow-md">✓</div>
        </div>

        <!-- 第3关 -->
        <div class="absolute transform -translate-x-1/2 -translate-y-1/2 flex flex-col items-center" style="left: 52%; top: 89%;">
          <div class="level-node completed shadow-lg">3</div>
          <div class="absolute top-full mt-2 bg-white/95 px-3 py-1 rounded-full text-xs font-bold text-gray-600 shadow-lg whitespace-nowrap">3. 连加练习</div>
          <div class="absolute -top-1 -right-1 w-5 h-5 bg-green-500 rounded-full flex items-center justify-center border-2 border-white shadow-md">✓</div>
        </div>

        <!-- 第4关 -->
        <div class="absolute transform -translate-x-1/2 -translate-y-1/2 flex flex-col items-center" style="left: 68%; top: 89%;">
          <div class="level-node completed shadow-lg">4</div>
          <div class="absolute top-full mt-2 bg-white/95 px-3 py-1 rounded-full text-xs font-bold text-gray-600 shadow-lg whitespace-nowrap">4. 连减挑战</div>
          <div class="absolute -top-1 -right-1 w-5 h-5 bg-green-500 rounded-full flex items-center justify-center border-2 border-white shadow-md">✓</div>
        </div>

        <!-- 第5关 - 右侧，已完成 -->
        <div class="absolute transform -translate-x-1/2 -translate-y-1/2 flex flex-col items-center" style="left: 84%; top: 89%;">
          <div class="level-node completed shadow-lg">5</div>
          <div class="absolute top-full mt-2 bg-white/95 px-3 py-1 rounded-full text-xs font-bold text-gray-600 shadow-lg whitespace-nowrap">5. 混合运算</div>
          <div class="absolute -top-1 -right-1 w-5 h-5 bg-green-500 rounded-full flex items-center justify-center border-2 border-white shadow-md">✓</div>
        </div>

        <!-- 第6关 - 第二行从右开始 -->
        <div class="absolute transform -translate-x-1/2 -translate-y-1/2 flex flex-col items-center" style="left: 84%; top: 83%;">
          <div class="level-node completed shadow-lg">6</div>
          <div class="absolute top-full mt-2 bg-white/95 px-3 py-1 rounded-full text-xs font-bold text-gray-600 shadow-lg whitespace-nowrap">6. 乘法初识</div>
          <div class="absolute -top-1 -right-1 w-5 h-5 bg-green-500 rounded-full flex items-center justify-center border-2 border-white shadow-md">✓</div>
        </div>

        <!-- 第7关 -->
        <div class="absolute transform -translate-x-1/2 -translate-y-1/2 flex flex-col items-center" style="left: 68%; top: 83%;">
          <div class="level-node completed shadow-lg">7</div>
          <div class="absolute top-full mt-2 bg-white/95 px-3 py-1 rounded-full text-xs font-bold text-gray-600 shadow-lg whitespace-nowrap">7. 乘法口诀</div>
          <div class="absolute -top-1 -right-1 w-5 h-5 bg-green-500 rounded-full flex items-center justify-center border-2 border-white shadow-md">✓</div>
        </div>

        <!-- 第8关 -->
        <div class="absolute transform -translate-x-1/2 -translate-y-1/2 flex flex-col items-center" style="left: 52%; top: 83%;">
          <div class="level-node completed shadow-lg">8</div>
          <div class="absolute top-full mt-2 bg-white/95 px-3 py-1 rounded-full text-xs font-bold text-gray-600 shadow-lg whitespace-nowrap">8. 除法入门</div>
          <div class="absolute -top-1 -right-1 w-5 h-5 bg-green-500 rounded-full flex items-center justify-center border-2 border-white shadow-md">✓</div>
        </div>

        <!-- 第9关 -->
        <div class="absolute transform -translate-x-1/2 -translate-y-1/2 flex flex-col items-center" style="left: 36%; top: 83%;">
          <div class="level-node completed shadow-lg">9</div>
          <div class="absolute top-full mt-2 bg-white/95 px-3 py-1 rounded-full text-xs font-bold text-gray-600 shadow-lg whitespace-nowrap">9. 除法练习</div>
          <div class="absolute -top-1 -right-1 w-5 h-5 bg-green-500 rounded-full flex items-center justify-center border-2 border-white shadow-md">✓</div>
        </div>

        <!-- 第10关 - 当前关卡（有角色） -->
        <div class="absolute transform -translate-x-1/2 -translate-y-1/2 flex flex-col items-center" style="left: 20%; top: 83%;">
          <!-- 角色 -->
          <div class="absolute -top-10 left-1/2 -translate-x-1/2 z-30 flex flex-col items-center character">
            <div class="w-10 h-10 bg-white rounded-full shadow-xl flex items-center justify-center border-2 border-white">
              <span class="text-lg">👾</span>
            </div>
            <div class="w-4 h-1 bg-black/25 rounded-full mt-1"></div>
          </div>
          <div class="level-node current shadow-lg">10</div>
          <div class="absolute top-full mt-2 bg-white/95 px-3 py-1 rounded-full text-xs font-bold text-gray-600 shadow-lg whitespace-nowrap">10. 混合运算</div>
        </div>

        <!-- 第11关 - 锁定 -->
        <div class="absolute transform -translate-x-1/2 -translate-y-1/2 flex flex-col items-center opacity-60" style="left: 20%; top: 77%;">
          <div class="level-node locked shadow-lg">🔒</div>
          <div class="absolute top-full mt-2 bg-white/95 px-3 py-1 rounded-full text-xs font-bold text-gray-600 shadow-lg whitespace-nowrap">11. 待解锁</div>
        </div>

        <!-- 更多锁定关卡示意 -->
        <div class="absolute transform -translate-x-1/2 -translate-y-1/2 flex flex-col items-center opacity-60" style="left: 36%; top: 77%;">
          <div class="level-node locked shadow-lg">🔒</div>
        </div>
        <div class="absolute transform -translate-x-1/2 -translate-y-1/2 flex flex-col items-center opacity-60" style="left: 52%; top: 77%;">
          <div class="level-node locked shadow-lg">🔒</div>
        </div>
        <div class="absolute transform -translate-x-1/2 -translate-y-1/2 flex flex-col items-center opacity-60" style="left: 68%; top: 77%;">
          <div class="level-node locked shadow-lg">🔒</div>
        </div>
        <div class="absolute transform -translate-x-1/2 -translate-y-1/2 flex flex-col items-center opacity-60" style="left: 84%; top: 77%;">
          <div class="level-node locked shadow-lg">🔒</div>
        </div>

        <!-- 终点旗帜 -->
        <div class="absolute left-1/2 -translate-x-1/2" style="top: 5%;">
          <span class="text-2xl animate-pulse">🚩</span>
        </div>

      </div>
    </div>
  </div>

</body>
</html>
