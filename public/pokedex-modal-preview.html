<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>宠物图鉴弹窗预览</title>
    <style>
      :root {
        --ink: #35506b;
        --subtle: #6d849d;
        --panel: rgba(255, 252, 246, 0.96);
        --line: rgba(255, 255, 255, 0.94);
        --shadow: 0 22px 54px rgba(34, 64, 103, 0.18);
        --soft-shadow: 0 10px 22px rgba(67, 99, 139, 0.12);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        overflow: hidden;
        font-family: "Hiragino Sans GB", "PingFang SC", "Microsoft YaHei", sans-serif;
        color: var(--ink);
        background:
          linear-gradient(180deg, rgba(21, 46, 78, 0.16), rgba(14, 31, 55, 0.48)),
          url("/images/一年级关卡背景图.png") center / cover no-repeat;
      }

      .frame {
        position: relative;
        width: min(1024px, 100vw);
        height: min(768px, 100vh);
        overflow: hidden;
        border-radius: 28px;
      }

      .scrim {
        position: absolute;
        inset: 0;
        background:
          radial-gradient(circle at 18% 22%, rgba(255, 220, 122, 0.18), transparent 20%),
          linear-gradient(180deg, rgba(16, 38, 65, 0.12), rgba(8, 17, 32, 0.52));
        backdrop-filter: blur(6px);
      }

      .modal {
        position: absolute;
        inset: 72px 88px;
        padding: 22px;
        border-radius: 34px;
        background: var(--panel);
        border: 2px solid var(--line);
        box-shadow: var(--shadow);
      }

      .modal::before {
        content: "";
        position: absolute;
        inset: 12px;
        border-radius: 26px;
        border: 1px dashed rgba(240, 183, 79, 0.34);
        pointer-events: none;
      }

      .header {
        position: relative;
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-bottom: 18px;
      }

      .title-wrap {
        display: flex;
        align-items: center;
        gap: 12px;
      }

      .title-badge {
        width: 46px;
        height: 46px;
        display: grid;
        place-items: center;
        border-radius: 16px;
        background: linear-gradient(180deg, #ffe58c, #ffc96f);
        box-shadow: 0 8px 16px rgba(255, 181, 66, 0.22);
        font-size: 24px;
      }

      h1 {
        margin: 0 0 4px;
        font-size: 28px;
        line-height: 1;
      }

      .sub {
        color: var(--subtle);
        font-size: 14px;
        font-weight: 700;
      }

      .close {
        width: 44px;
        height: 44px;
        border: 0;
        border-radius: 14px;
        background: rgba(255,255,255,0.92);
        color: #7a8ea7;
        box-shadow: var(--soft-shadow);
        font-size: 24px;
      }

      .body {
        display: grid;
        grid-template-columns: 260px 1fr;
        gap: 18px;
        height: calc(100% - 74px);
      }

      .current {
        display: flex;
        flex-direction: column;
        padding: 18px;
        border-radius: 28px;
        background: linear-gradient(180deg, #ffd866, #ffb859);
        border: 2px solid rgba(255,255,255,0.72);
        box-shadow:
          inset 0 -6px 0 rgba(201, 129, 25, 0.16),
          0 16px 26px rgba(244, 166, 52, 0.18);
      }

      .current-tag {
        display: inline-flex;
        width: fit-content;
        padding: 7px 12px;
        border-radius: 999px;
        background: rgba(255,255,255,0.22);
        color: white;
        font-size: 12px;
        font-weight: 900;
        letter-spacing: 0.06em;
      }

      .pet {
        flex: 1;
        display: grid;
        place-items: center;
        padding: 8px 0;
      }

      .pet-bubble {
        width: 138px;
        height: 138px;
        display: grid;
        place-items: center;
        border-radius: 50%;
        background: rgba(255,255,255,0.24);
        border: 4px solid rgba(255,255,255,0.45);
        box-shadow:
          inset 0 12px 24px rgba(255,255,255,0.28),
          0 14px 24px rgba(180, 106, 10, 0.18);
        font-size: 76px;
      }

      .current-name {
        margin: 0 0 8px;
        text-align: center;
        color: white;
        font-size: 28px;
        font-weight: 900;
      }

      .current-desc {
        margin: 0;
        padding: 12px 14px;
        border-radius: 18px;
        background: rgba(255,255,255,0.18);
        color: rgba(255,255,255,0.95);
        font-size: 14px;
        line-height: 1.55;
        font-weight: 700;
        text-align: center;
      }

      .cards-panel {
        display: flex;
        flex-direction: column;
        min-height: 0;
        padding: 8px 4px 0;
      }

      .panel-head {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-bottom: 12px;
      }

      .panel-title {
        font-size: 16px;
        font-weight: 900;
      }

      .panel-note {
        color: var(--subtle);
        font-size: 12px;
        font-weight: 800;
      }

      .grid {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 12px;
      }

      .card {
        position: relative;
        padding: 12px;
        border-radius: 24px;
        background: rgba(255,255,255,0.84);
        border: 2px solid rgba(255,255,255,0.96);
        box-shadow: var(--soft-shadow);
      }

      .card.active {
        box-shadow:
          0 14px 28px rgba(255, 184, 64, 0.18),
          inset 0 0 0 2px rgba(255, 202, 102, 0.18);
      }

      .card.active::before {
        content: "出战";
        position: absolute;
        top: -8px;
        right: 12px;
        padding: 4px 10px;
        border-radius: 999px;
        background: linear-gradient(180deg, #ffe48f, #ffc95a);
        color: #8f5d00;
        font-size: 11px;
        font-weight: 900;
      }

      .card.locked {
        background: rgba(236, 240, 245, 0.88);
      }

      .avatar {
        width: 70px;
        height: 70px;
        margin: 2px auto 10px;
        display: grid;
        place-items: center;
        border-radius: 22px;
        font-size: 40px;
        box-shadow: inset 0 10px 18px rgba(255,255,255,0.24);
      }

      .name {
        text-align: center;
        font-size: 14px;
        font-weight: 900;
        margin-bottom: 4px;
      }

      .meta {
        text-align: center;
        color: var(--subtle);
        font-size: 11px;
        font-weight: 800;
      }

      .locked .avatar,
      .locked .name,
      .locked .meta {
        filter: grayscale(1);
        opacity: 0.55;
      }

      .lock {
        position: absolute;
        inset: auto 10px 10px 10px;
        padding: 8px 10px;
        border-radius: 999px;
        background: rgba(108, 127, 152, 0.14);
        color: #6d8197;
        text-align: center;
        font-size: 11px;
        font-weight: 900;
      }

      @media (max-width: 920px) {
        .modal {
          inset: 24px;
        }

        .body {
          grid-template-columns: 1fr;
          height: auto;
        }

        .grid {
          grid-template-columns: repeat(2, 1fr);
        }
      }
    </style>
  </head>
  <body>
    <div class="frame">
      <div class="scrim"></div>

      <section class="modal">
        <div class="header">
          <div class="title-wrap">
            <div class="title-badge">📖</div>
            <div>
              <h1>宠物图鉴</h1>
              <div class="sub">只改成弹窗样式，保留原本“当前伙伴 + 图鉴列表”的理解方式。</div>
            </div>
          </div>
          <button class="close" type="button">×</button>
        </div>

        <div class="body">
          <aside class="current">
            <div class="current-tag">当前出战伙伴</div>
            <div class="pet">
              <div class="pet-bubble">🍮</div>
            </div>
            <h2 class="current-name">布丁史莱姆</h2>
            <p class="current-desc">软乎乎的初始伙伴，最喜欢吃甜食，总是充满活力。</p>
          </aside>

          <section class="cards-panel">
            <div class="panel-head">
              <div class="panel-title">伙伴列表</div>
              <div class="panel-note">简化版卡片，只做视觉统一</div>
            </div>

            <div class="grid">
              <article class="card active">
                <div class="avatar" style="background:linear-gradient(180deg,#ffe58f,#ffbe5d);">🍮</div>
                <div class="name">布丁史莱姆</div>
                <div class="meta">已解锁</div>
              </article>

              <article class="card">
                <div class="avatar" style="background:linear-gradient(180deg,#ffd3b3,#ffa265);">🦊</div>
                <div class="name">火尾狐</div>
                <div class="meta">5 碎片解锁</div>
              </article>

              <article class="card">
                <div class="avatar" style="background:linear-gradient(180deg,#d6efff,#7dc8ff);">💧</div>
                <div class="name">水灵泡泡</div>
                <div class="meta">10 碎片解锁</div>
              </article>

              <article class="card">
                <div class="avatar" style="background:linear-gradient(180deg,#d8f9e4,#5bc987);">🐲</div>
                <div class="name">叶绿龙</div>
                <div class="meta">15 碎片解锁</div>
              </article>

              <article class="card locked">
                <div class="avatar" style="background:linear-gradient(180deg,#eef2f7,#d9e0e8);">🦅</div>
                <div class="name">未知伙伴</div>
                <div class="meta">20 碎片解锁</div>
                <div class="lock">还差 1 块碎片</div>
              </article>

              <article class="card locked">
                <div class="avatar" style="background:linear-gradient(180deg,#efeaf9,#dad3ef);">🐱</div>
                <div class="name">未知伙伴</div>
                <div class="meta">25 碎片解锁</div>
                <div class="lock">尚未解锁</div>
              </article>
            </div>
          </section>
        </div>
      </section>
    </div>
  </body>
</html>
