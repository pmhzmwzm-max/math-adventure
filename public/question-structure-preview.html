<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>100关结构预览</title>
    <style>
      :root {
        --bg: #f6eddf;
        --panel: rgba(255, 251, 245, 0.95);
        --ink: #314761;
        --muted: #72849b;
        --line: rgba(255, 255, 255, 0.92);
        --shadow: 0 18px 40px rgba(61, 82, 114, 0.12);
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        font-family: "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
        color: var(--ink);
        background:
          radial-gradient(circle at top left, rgba(255, 200, 102, 0.24), transparent 20%),
          radial-gradient(circle at right, rgba(122, 203, 255, 0.18), transparent 24%),
          linear-gradient(180deg, #f9f4ec, #efe4d4);
      }
      .app {
        max-width: 1460px;
        margin: 0 auto;
        padding: 24px;
      }
      .hero, .panel {
        background: var(--panel);
        border: 2px solid var(--line);
        border-radius: 28px;
        box-shadow: var(--shadow);
      }
      .hero {
        padding: 24px 28px;
        margin-bottom: 18px;
      }
      .pill {
        display: inline-flex;
        padding: 8px 12px;
        border-radius: 999px;
        background: rgba(255, 182, 67, 0.14);
        color: #9b5f00;
        font-size: 13px;
        font-weight: 900;
        margin-bottom: 12px;
      }
      h1 { margin: 0 0 8px; font-size: 34px; }
      .hero p {
        margin: 0;
        color: var(--muted);
        font-weight: 700;
        line-height: 1.7;
      }
      .tabs {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
        margin-bottom: 18px;
      }
      .tab {
        border: 0;
        cursor: pointer;
        padding: 12px 18px;
        border-radius: 16px;
        background: white;
        color: var(--ink);
        font-weight: 900;
        box-shadow: 0 10px 20px rgba(92, 114, 148, 0.1);
      }
      .tab.active {
        background: linear-gradient(180deg, #ffd36b, #ffb34c);
        color: #7d4a00;
      }
      .layout {
        display: grid;
        grid-template-columns: 290px 1fr;
        gap: 18px;
      }
      .panel { padding: 18px; }
      .section-title {
        margin: 0 0 12px;
        font-size: 20px;
      }
      .summary-list {
        display: grid;
        gap: 10px;
      }
      .summary-card {
        background: rgba(255,255,255,0.82);
        border-radius: 20px;
        padding: 14px 16px;
      }
      .summary-card strong {
        display: block;
        margin-top: 6px;
        font-size: 26px;
      }
      .table {
        display: grid;
        gap: 10px;
      }
      .row {
        display: grid;
        grid-template-columns: 110px 190px 130px 1fr;
        gap: 12px;
        align-items: start;
        padding: 14px 16px;
        border-radius: 20px;
        background: rgba(255,255,255,0.86);
      }
      .range {
        display: inline-flex;
        justify-content: center;
        padding: 8px 12px;
        border-radius: 999px;
        background: rgba(255, 205, 110, 0.2);
        color: #8a5600;
        font-weight: 900;
      }
      .unit {
        font-weight: 900;
        line-height: 1.5;
      }
      .phase {
        color: var(--muted);
        font-weight: 800;
        line-height: 1.6;
      }
      .goal {
        color: #445a76;
        font-weight: 700;
        line-height: 1.7;
      }
      .legend {
        margin-top: 16px;
        padding: 14px 16px;
        border-radius: 18px;
        background: rgba(119, 200, 255, 0.12);
        color: #365270;
        font-weight: 700;
        line-height: 1.7;
      }
      @media (max-width: 1180px) {
        .layout { grid-template-columns: 1fr; }
        .row { grid-template-columns: 1fr; }
      }
    </style>
  </head>
  <body>
    <div class="app">
      <section class="hero">
        <div class="pill">先审结构，再生成正式题库</div>
        <h1>100关关卡结构重排预览</h1>
        <p>
          这一版只解决“同一知识点连续太久、孩子容易无聊”的问题。<br />
          设计原则：单个主题连续关卡尽量控制在 <strong>4-8关</strong>；每个年级都插入“变式”“应用”“综合回环”，不让孩子长时间刷同一类题。
        </p>
      </section>

      <div class="tabs" id="tabs"></div>

      <div class="layout">
        <aside class="panel">
          <h2 class="section-title">结构摘要</h2>
          <div class="summary-list" id="summary"></div>
          <div class="legend">
            结构说明：<br />
            `新知` 负责引入概念。<br />
            `基础` 负责形成熟练度。<br />
            `变式` 负责防止只会机械套题。<br />
            `应用` 负责把知识放进情境。<br />
            `综合` 负责回环复习和混合检验。
          </div>
        </aside>

        <main class="panel">
          <h2 class="section-title" id="title"></h2>
          <div class="table" id="table"></div>
        </main>
      </div>
    </div>

    <script>
      const structures = {
        kindergarten: {
          label: '幼儿园',
          summary: {
            levels: 100,
            longest: '8关',
            themes: 15,
            note: '以数感、规律、分类、生活化为主，不做长段纯计算'
          },
          rows: [
            ['1-1', '演示关卡', '总览', '保留全题型演示，帮助孩子和家长熟悉玩法'],
            ['2-7', '数数与点数', '新知+基础', '1-5的数量感知、点数、手口一致'],
            ['8-13', '数物对应', '基础', '把数字和具体物品建立一一对应'],
            ['14-19', '多少与比较', '变式', '比多比少、同样多、谁更多'],
            ['20-25', '数字读认', '新知', '认数字1-10、顺序和相邻数'],
            ['26-31', '图形与分类', '变式', '按颜色、形状、大小做分类'],
            ['32-37', '规律发现', '新知+变式', 'AB、ABB、递增规律'],
            ['38-43', '5以内加法', '基础', '从合起来到算式表达'],
            ['44-49', '5以内减法', '基础', '从去掉、剩下到算式表达'],
            ['50-55', '10以内组成', '新知+基础', '分与合、凑整感知'],
            ['56-61', '10以内加减', '基础', '不连续长刷，同步穿插应用'],
            ['62-67', '位置与顺序', '变式', '第几、前后左右、排队顺序'],
            ['68-75', '生活应用小题', '应用', '水果、玩具、人数等情境'],
            ['76-87', '混合趣味关', '综合', '数数/比较/规律/简单加减穿插'],
            ['88-100', '毕业准备关', '综合提升', '为一年级做衔接：顺序、读数、10以内加减']
          ]
        },
        grade1: {
          label: '一年级',
          summary: {
            levels: 100,
            longest: '8关',
            themes: 16,
            note: '避免20以内进位加长刷，拆成小主题轮换'
          },
          rows: [
            ['1-6', '1-5认识与加减', '新知+基础', '1-5数感、加减、比较'],
            ['7-12', '6-10认识与加减', '基础', '10以内继续扩展'],
            ['13-18', '比较与相邻数', '变式', '大小、前后、相邻数'],
            ['19-24', '分与合', '新知+基础', '为后面凑十做铺垫'],
            ['25-30', '11-20认识', '新知', '读数、写数、组成'],
            ['31-36', '数位感知', '基础', '1个十和几个一'],
            ['37-42', '认识钟表', '新知+基础', '整时、半时、简单经过时间'],
            ['43-48', '凑十准备', '变式', '9和几、8和几、分解重组'],
            ['49-54', '9加几', '基础', '单独拿出来练，不混成大段刷题'],
            ['55-60', '8、7、6加几', '基础', '按难度递进'],
            ['61-66', '进位加应用', '应用', '故事题、生活题'],
            ['67-72', '20以内退位减', '新知+基础', '和进位加穿插，不独立拖太长'],
            ['73-78', '比较与算式选择', '变式', '同结果、不同表达方式'],
            ['79-86', '综合运算', '综合', '加减、比较、钟表混合'],
            ['87-93', '易错纠偏', '变式+综合', '大小混淆、十几数、进退位易错'],
            ['94-100', '毕业挑战关', '综合提升', '为二年级铺路，控制在孩子可接受强度']
          ]
        },
        grade2: {
          label: '二年级',
          summary: {
            levels: 100,
            longest: '8关',
            themes: 17,
            note: '乘法口诀不再整段硬刷，插入角、时间、应用和回环'
          },
          rows: [
            ['1-6', '长度单位认识', '新知+基础', '厘米、米、实际量感'],
            ['7-12', '长度比较与换算', '变式', '长短比较、单位变换'],
            ['13-18', '100以内加减（不进退位）', '新知+基础', '先打稳基础'],
            ['19-24', '100以内加减（进位）', '基础', '单列短段练习'],
            ['25-30', '100以内加减（退位）', '基础', '避免与进位混成冗长重复'],
            ['31-36', '加减应用题', '应用', '购物、人数、剩余量'],
            ['37-42', '角的初步认识', '新知+变式', '锐角直角钝角判断'],
            ['43-48', '乘法意义', '新知', '几个几、连加到乘法'],
            ['49-54', '2-5口诀', '基础', '控制长度，不拖成十几关'],
            ['55-60', '6-9口诀', '基础', '和前段分开处理'],
            ['61-66', '口诀变式', '变式', '逆向、填空、选答案'],
            ['67-72', '乘法应用', '应用', '行列、分组、购物'],
            ['73-78', '认识时间', '新知+基础', '整时、半时、几时几分'],
            ['79-84', '观察与顺序', '变式', '从不同视角、时间先后'],
            ['85-90', '乘加混合', '综合', '不做难运算，重在思路转换'],
            ['91-95', '综合回环关', '综合', '加减、长度、时间、乘法混合'],
            ['96-100', '毕业冲刺关', '综合提升', '高频知识回顾，控制重复感']
          ]
        },
        grade3: {
          label: '三年级',
          summary: {
            levels: 100,
            longest: '8关',
            themes: 18,
            note: '万以内加减和多位乘一位都拆成多个短主题，不再长线刷'
          },
          rows: [
            ['1-5', '时分秒', '新知', '秒的认识、时间换算'],
            ['6-10', '经过时间', '基础+应用', '简短时间问题'],
            ['11-16', '万以内加减（口算基础）', '新知+基础', '先打通数感'],
            ['17-22', '万以内加法（笔算）', '基础', '短段集中'],
            ['23-28', '万以内减法（笔算）', '基础', '与加法拆开，避免疲劳'],
            ['29-34', '加减应用题', '应用', '路程、购物、人数变化'],
            ['35-40', '测量与单位换算', '新知+基础', '毫米、分米、千米等'],
            ['41-46', '长度与周长感知', '变式', '图形周长入门'],
            ['47-52', '倍的认识', '新知+基础', '几倍、是几倍'],
            ['53-58', '倍的应用', '应用', '倍数情境题'],
            ['59-64', '多位数乘一位数（基础）', '新知+基础', '先小步推进'],
            ['65-70', '多位数乘一位数（进位）', '基础', '单独拆段练'],
            ['71-76', '乘法应用题', '应用', '箱数、排数、单价数量'],
            ['77-82', '长方形和正方形', '新知+基础', '周长为主'],
            ['83-88', '分数初步认识', '新知+变式', '优先用选择题承载'],
            ['89-94', '集合与综合判断', '变式+综合', '不让分数独占太长'],
            ['95-97', '混合回环关', '综合', '时间/加减/测量/倍混合'],
            ['98-100', '毕业挑战关', '综合提升', '知识广覆盖，避免单点重复']
          ]
        }
      };

      const order = ['kindergarten', 'grade1', 'grade2', 'grade3'];
      let current = order[0];

      function renderTabs() {
        const tabs = document.getElementById('tabs');
        tabs.innerHTML = order.map((key) => `
          <button class="tab ${key === current ? 'active' : ''}" data-key="${key}">
            ${structures[key].label}
          </button>
        `).join('');
        tabs.querySelectorAll('.tab').forEach((btn) => {
          btn.addEventListener('click', () => {
            current = btn.dataset.key;
            render();
          });
        });
      }

      function renderSummary() {
        const data = structures[current];
        document.getElementById('summary').innerHTML = `
          <div class="summary-card">总关卡数<strong>${data.summary.levels}</strong></div>
          <div class="summary-card">最长连续主题<strong>${data.summary.longest}</strong></div>
          <div class="summary-card">主题段数量<strong>${data.summary.themes}</strong></div>
          <div class="summary-card">设计备注<strong style="font-size:18px;">${data.summary.note}</strong></div>
        `;
      }

      function renderTable() {
        const data = structures[current];
        document.getElementById('title').textContent = `${data.label} · 100关结构分布`;
        document.getElementById('table').innerHTML = data.rows.map((row) => `
          <div class="row">
            <div class="range">${row[0]}</div>
            <div class="unit">${row[1]}</div>
            <div class="phase">${row[2]}</div>
            <div class="goal">${row[3]}</div>
          </div>
        `).join('');
      }

      function render() {
        renderTabs();
        renderSummary();
        renderTable();
      }

      render();
    </script>
  </body>
</html>
