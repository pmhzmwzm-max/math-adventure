<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=1024, height=768">
  <title>岛屿选择页 - 动态设计稿</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      width: 1024px;
      height: 768px;
      overflow: hidden;
      background: linear-gradient(180deg, #87CEEB 0%, #E0F6FF 50%, #B8E6F0 100%);
      position: relative;
    }

    /* ===== 背景层 ===== */
    .bg-sky {
      position: absolute;
      inset: 0;
      background: linear-gradient(180deg,
        #5BC0DE 0%,
        #87CEEB 30%,
        #B0E0E6 60%,
        #E0F6FF 100%
      );
    }

    /* 太阳光晕 - 缓慢脉动 */
    .sun {
      position: absolute;
      top: 60px;
      right: 120px;
      width: 80px;
      height: 80px;
      background: radial-gradient(circle, #FFD700 0%, #FFA500 50%, transparent 70%);
      border-radius: 50%;
      animation: sunPulse 4s ease-in-out infinite;
    }

    .sun::before {
      content: '';
      position: absolute;
      inset: -20px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(255,215,0,0.3) 0%, transparent 70%);
      animation: sunGlow 6s ease-in-out infinite;
    }

    @keyframes sunPulse {
      0%, 100% { transform: scale(1); opacity: 0.9; }
      50% { transform: scale(1.1); opacity: 1; }
    }

    @keyframes sunGlow {
      0%, 100% { transform: scale(1); opacity: 0.5; }
      50% { transform: scale(1.3); opacity: 0.8; }
    }

    /* ===== 远景山脉 - 视差缓慢移动 ===== */
    .mountains-far {
      position: absolute;
      bottom: 200px;
      left: 0;
      width: 200%;
      height: 150px;
      background: linear-gradient(180deg,
        #A8D5E5 0%,
        #7FB3D5 50%,
        transparent 100%
      );
      clip-path: polygon(
        0% 100%, 5% 60%, 10% 80%, 15% 50%, 20% 70%,
        25% 40%, 30% 65%, 35% 45%, 40% 70%, 45% 35%,
        50% 60%, 55% 30%, 60% 55%, 65% 40%, 70% 65%,
        75% 35%, 80% 55%, 85% 45%, 90% 70%, 95% 50%,
        100% 100%
      );
      opacity: 0.6;
      animation: parallaxMove 60s linear infinite;
    }

    @keyframes parallaxMove {
      0% { transform: translateX(0); }
      100% { transform: translateX(-50%); }
    }

    /* ===== 漂浮云朵 ===== */
    .cloud {
      position: absolute;
      background: rgba(255,255,255,0.9);
      border-radius: 100px;
      filter: blur(1px);
    }

    .cloud::before,
    .cloud::after {
      content: '';
      position: absolute;
      background: rgba(255,255,255,0.9);
      border-radius: 100px;
    }

    .cloud1 {
      width: 100px;
      height: 40px;
      top: 80px;
      left: -120px;
      animation: floatCloud1 40s linear infinite;
    }
    .cloud1::before { width: 50px; height: 50px; top: -25px; left: 10px; }
    .cloud1::after { width: 60px; height: 40px; top: -15px; right: 10px; }

    .cloud2 {
      width: 80px;
      height: 35px;
      top: 150px;
      left: -100px;
      opacity: 0.7;
      animation: floatCloud2 50s linear infinite;
    }
    .cloud2::before { width: 40px; height: 40px; top: -20px; left: 15px; }
    .cloud2::after { width: 50px; height: 35px; top: -10px; right: 15px; }

    .cloud3 {
      width: 120px;
      height: 45px;
      top: 200px;
      left: -150px;
      opacity: 0.8;
      animation: floatCloud3 45s linear infinite;
      animation-delay: -15s;
    }
    .cloud3::before { width: 60px; height: 60px; top: -30px; left: 20px; }
    .cloud3::after { width: 70px; height: 45px; top: -20px; right: 20px; }

    .cloud4 {
      width: 60px;
      height: 25px;
      top: 300px;
      left: -80px;
      opacity: 0.5;
      animation: floatCloud4 35s linear infinite;
      animation-delay: -10s;
    }
    .cloud4::before { width: 30px; height: 30px; top: -15px; left: 10px; }
    .cloud4::after { width: 35px; height: 25px; top: -8px; right: 10px; }

    @keyframes floatCloud1 {
      0% { transform: translateX(0); }
      100% { transform: translateX(1200px); }
    }
    @keyframes floatCloud2 {
      0% { transform: translateX(0); }
      100% { transform: translateX(1200px); }
    }
    @keyframes floatCloud3 {
      0% { transform: translateX(0); }
      100% { transform: translateX(1200px); }
    }
    @keyframes floatCloud4 {
      0% { transform: translateX(0); }
      100% { transform: translateX(1200px); }
    }

    /* ===== 飘浮粒子/光点 ===== */
    .particles {
      position: absolute;
      inset: 0;
      overflow: hidden;
      pointer-events: none;
    }

    .particle {
      position: absolute;
      width: 4px;
      height: 4px;
      background: rgba(255,255,255,0.8);
      border-radius: 50%;
      animation: particleFloat 8s ease-in-out infinite;
    }

    .particle:nth-child(1) { left: 10%; top: 20%; animation-delay: 0s; }
    .particle:nth-child(2) { left: 25%; top: 40%; animation-delay: 1s; }
    .particle:nth-child(3) { left: 40%; top: 15%; animation-delay: 2s; }
    .particle:nth-child(4) { left: 55%; top: 35%; animation-delay: 3s; }
    .particle:nth-child(5) { left: 70%; top: 25%; animation-delay: 4s; }
    .particle:nth-child(6) { left: 85%; top: 45%; animation-delay: 5s; }
    .particle:nth-child(7) { left: 15%; top: 60%; animation-delay: 1.5s; }
    .particle:nth-child(8) { left: 35%; top: 70%; animation-delay: 2.5s; }
    .particle:nth-child(9) { left: 60%; top: 55%; animation-delay: 3.5s; }
    .particle:nth-child(10) { left: 80%; top: 65%; animation-delay: 4.5s; }

    @keyframes particleFloat {
      0%, 100% {
        transform: translateY(0) translateX(0);
        opacity: 0.3;
      }
      25% {
        transform: translateY(-20px) translateX(10px);
        opacity: 1;
      }
      50% {
        transform: translateY(-10px) translateX(-5px);
        opacity: 0.6;
      }
      75% {
        transform: translateY(-30px) translateX(15px);
        opacity: 0.8;
      }
    }

    /* ===== 飞鸟 ===== */
    .bird {
      position: absolute;
      width: 20px;
      height: 10px;
      opacity: 0.6;
    }

    .bird::before,
    .bird::after {
      content: '';
      position: absolute;
      width: 12px;
      height: 3px;
      background: #555;
      border-radius: 0 50% 50% 0;
      animation: wingFlap 0.5s ease-in-out infinite;
    }

    .bird::before {
      left: 0;
      transform: rotate(-20deg);
    }

    .bird::after {
      right: 0;
      transform: rotate(20deg) scaleX(-1);
    }

    @keyframes wingFlap {
      0%, 100% { transform: rotate(-20deg) translateY(0); }
      50% { transform: rotate(-30deg) translateY(-3px); }
    }

    .bird1 {
      top: 100px;
      left: -30px;
      animation: flyAcross1 25s linear infinite;
    }

    .bird2 {
      top: 180px;
      left: -30px;
      animation: flyAcross2 30s linear infinite;
      animation-delay: -10s;
    }

    .bird3 {
      top: 140px;
      left: -30px;
      animation: flyAcross3 28s linear infinite;
      animation-delay: -5s;
    }

    @keyframes flyAcross1 {
      0% { transform: translateX(0) translateY(0); }
      25% { transform: translateX(300px) translateY(-20px); }
      50% { transform: translateX(600px) translateY(10px); }
      75% { transform: translateX(900px) translateY(-15px); }
      100% { transform: translateX(1100px) translateY(0); }
    }

    @keyframes flyAcross2 {
      0% { transform: translateX(0) translateY(0); }
      30% { transform: translateX(350px) translateY(15px); }
      60% { transform: translateX(700px) translateY(-25px); }
      100% { transform: translateX(1100px) translateY(5px); }
    }

    @keyframes flyAcross3 {
      0% { transform: translateX(0) translateY(0); }
      20% { transform: translateX(250px) translateY(-30px); }
      50% { transform: translateX(550px) translateY(0); }
      80% { transform: translateX(850px) translateY(-20px); }
      100% { transform: translateX(1100px) translateY(0); }
    }

    /* ===== 岛屿容器 ===== */
    .islands-container {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* ===== 单个岛屿 ===== */
    .island-wrapper {
      position: absolute;
      animation: islandFloat 6s ease-in-out infinite;
    }

    .island-wrapper:nth-child(1) { /* 幼儿园 - 左下 */
      left: 15%;
      bottom: 25%;
      animation-delay: 0s;
    }

    .island-wrapper:nth-child(2) { /* 一年级 - 右中 */
      right: 15%;
      bottom: 42%;
      animation-delay: 1.5s;
    }

    .island-wrapper:nth-child(3) { /* 二年级 - 左中 */
      left: 15%;
      bottom: 59%;
      animation-delay: 3s;
    }

    .island-wrapper:nth-child(4) { /* 三年级 - 右上 */
      right: 15%;
      bottom: 76%;
      animation-delay: 4.5s;
    }

    @keyframes islandFloat {
      0%, 100% { transform: translateY(0) rotate(0deg); }
      50% { transform: translateY(-8px) rotate(1deg); }
    }

    /* 岛屿占位样式 */
    .island {
      width: 280px;
      height: 180px;
      background: linear-gradient(135deg, #90EE90 0%, #7FCD7F 50%, #6BB36B 100%);
      border-radius: 50% 50% 50% 50% / 60% 60% 40% 40%;
      position: relative;
      box-shadow:
        0 20px 40px rgba(0,0,0,0.2),
        inset 0 -10px 20px rgba(0,0,0,0.1),
        inset 0 10px 20px rgba(255,255,255,0.3);
    }

    /* 岛屿上的装饰 */
    .island::before {
      content: '';
      position: absolute;
      top: 20%;
      left: 30%;
      width: 40%;
      height: 30%;
      background: rgba(255,255,255,0.2);
      border-radius: 50%;
      filter: blur(10px);
    }

    /* 岛屿阴影 */
    .island-shadow {
      position: absolute;
      bottom: -15px;
      left: 10%;
      width: 80%;
      height: 30px;
      background: radial-gradient(ellipse, rgba(0,0,0,0.2) 0%, transparent 70%);
      border-radius: 50%;
      animation: shadowPulse 6s ease-in-out infinite;
    }

    @keyframes shadowPulse {
      0%, 100% { transform: scale(1); opacity: 0.3; }
      50% { transform: scale(0.9); opacity: 0.2; }
    }

    /* 头像标记 */
    .avatar-marker {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 64px;
      height: 64px;
      background: white;
      border-radius: 50%;
      border: 4px solid white;
      box-shadow: 0 4px 15px rgba(0,0,0,0.2);
      animation: avatarBounce 2s ease-in-out infinite;
      z-index: 100;
    }

    @keyframes avatarBounce {
      0%, 100% { transform: translate(-50%, -50%) translateY(0); }
      50% { transform: translate(-50%, -50%) translateY(-10px); }
    }

    .avatar-marker::after {
      content: '';
      position: absolute;
      bottom: -8px;
      left: 50%;
      transform: translateX(-50%);
      width: 0;
      height: 0;
      border-left: 8px solid transparent;
      border-right: 8px solid transparent;
      border-top: 12px solid white;
    }

    /* 标题 */
    .title {
      position: absolute;
      top: 40px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 32px;
      font-weight: 900;
      color: white;
      text-shadow:
        0 2px 4px rgba(0,0,0,0.2),
        0 4px 8px rgba(0,0,0,0.1);
      z-index: 200;
      letter-spacing: 2px;
    }

    /* ===== 热气球 ===== */
    .balloon {
      position: absolute;
      width: 40px;
      height: 50px;
      opacity: 0.7;
      animation: balloonFloat 50s linear infinite;
    }

    .balloon-body {
      width: 40px;
      height: 45px;
      background: linear-gradient(135deg, #FF6B6B 0%, #EE5A5A 50%, #DD4444 100%);
      border-radius: 50% 50% 50% 50% / 60% 60% 40% 40%;
      position: relative;
    }

    .balloon-body::after {
      content: '';
      position: absolute;
      bottom: -8px;
      left: 50%;
      transform: translateX(-50%);
      width: 12px;
      height: 8px;
      background: #8B4513;
      border-radius: 2px;
    }

    .balloon-line {
      position: absolute;
      bottom: -25px;
      left: 50%;
      transform: translateX(-50%);
      width: 1px;
      height: 20px;
      background: rgba(0,0,0,0.3);
    }

    .balloon1 {
      top: 120px;
      left: -50px;
      animation-delay: 0s;
    }

    .balloon2 {
      top: 200px;
      left: -50px;
      animation-delay: -25s;
    }

    @keyframes balloonFloat {
      0% { transform: translateX(0) translateY(0); }
      25% { transform: translateX(300px) translateY(-30px); }
      50% { transform: translateX(600px) translateY(10px); }
      75% { transform: translateX(900px) translateY(-20px); }
      100% { transform: translateX(1100px) translateY(0); }
    }

    /* ===== 闪烁星星 ===== */
    .twinkle-star {
      position: absolute;
      width: 6px;
      height: 6px;
      background: white;
      border-radius: 50%;
      animation: twinkle 3s ease-in-out infinite;
    }

    .twinkle-star::before {
      content: '';
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 20px;
      height: 2px;
      background: linear-gradient(90deg, transparent, white, transparent);
    }

    .twinkle-star::after {
      content: '';
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%) rotate(90deg);
      width: 20px;
      height: 2px;
      background: linear-gradient(90deg, transparent, white, transparent);
    }

    @keyframes twinkle {
      0%, 100% { opacity: 0.3; transform: scale(0.8); }
      50% { opacity: 1; transform: scale(1.2); }
    }

    .star1 { top: 50px; left: 100px; animation-delay: 0s; }
    .star2 { top: 120px; left: 300px; animation-delay: 0.5s; }
    .star3 { top: 80px; left: 500px; animation-delay: 1s; }
    .star4 { top: 150px; left: 700px; animation-delay: 1.5s; }
    .star5 { top: 60px; left: 900px; animation-delay: 2s; }
  </style>
</head>
<body>
  <!-- 天空背景 -->
  <div class="bg-sky"></div>

  <!-- 太阳光晕 -->
  <div class="sun"></div>

  <!-- 远景山脉 -->
  <div class="mountains-far"></div>

  <!-- 飘浮粒子 -->
  <div class="particles">
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
  </div>

  <!-- 闪烁星星 -->
  <div class="twinkle-star star1"></div>
  <div class="twinkle-star star2"></div>
  <div class="twinkle-star star3"></div>
  <div class="twinkle-star star4"></div>
  <div class="twinkle-star star5"></div>

  <!-- 云朵 -->
  <div class="cloud cloud1"></div>
  <div class="cloud cloud2"></div>
  <div class="cloud cloud3"></div>
  <div class="cloud cloud4"></div>

  <!-- 飞鸟 -->
  <div class="bird bird1"></div>
  <div class="bird bird2"></div>
  <div class="bird bird3"></div>

  <!-- 热气球 -->
  <div class="balloon balloon1">
    <div class="balloon-body"></div>
    <div class="balloon-line"></div>
  </div>
  <div class="balloon balloon2">
    <div class="balloon-body" style="background: linear-gradient(135deg, #FFD93D 0%, #F5C842 50%, #E8B838 100%);"></div>
    <div class="balloon-line"></div>
  </div>

  <!-- 标题 -->
  <h1 class="title">选择你的冒险世界</h1>

  <!-- 岛屿容器 -->
  <div class="islands-container">
    <!-- 幼儿园 -->
    <div class="island-wrapper">
      <div class="island"></div>
      <div class="island-shadow"></div>
      <div class="avatar-marker" style="background: linear-gradient(135deg, #FFE5B4, #FFD4A3);"></div>
    </div>

    <!-- 一年级 -->
    <div class="island-wrapper">
      <div class="island" style="background: linear-gradient(135deg, #FFB6C1 0%, #FF9AAE 50%, #FF7E99 100%);"></div>
      <div class="island-shadow"></div>
    </div>

    <!-- 二年级 -->
    <div class="island-wrapper">
      <div class="island" style="background: linear-gradient(135deg, #98D8C8 0%, #7FCDBB 50%, #66C2AE 100%);"></div>
      <div class="island-shadow"></div>
    </div>

    <!-- 三年级 -->
    <div class="island-wrapper">
      <div class="island" style="background: linear-gradient(135deg, #F7DC6F 0%, #F5D056 50%, #F3C43D 100%);"></div>
      <div class="island-shadow"></div>
    </div>
  </div>
</body>
</html>
